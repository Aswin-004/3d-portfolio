<svg xmlns="http://www.w3.org/2000/svg" width="800" height="500" viewBox="0 0 800 500">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a1a"/>
      <stop offset="50%" style="stop-color:#1a1a3e"/>
      <stop offset="100%" style="stop-color:#0d1b2a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f7971e"/>
      <stop offset="100%" style="stop-color:#ffd200"/>
    </linearGradient>
  </defs>
  <rect width="800" height="500" fill="url(#bg)" rx="12"/>
  
  <!-- ATM Machine outline -->
  <rect x="270" y="80" width="260" height="300" rx="15" fill="none" stroke="#ffd200" stroke-width="2" opacity="0.5"/>
  <rect x="290" y="100" width="220" height="120" rx="8" fill="#111128" stroke="#f7971e" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Screen content -->
  <text x="400" y="145" text-anchor="middle" fill="#ffd200" font-family="monospace" font-size="14" opacity="0.8">BALANCE</text>
  <text x="400" y="175" text-anchor="middle" fill="#00ff88" font-family="monospace" font-size="22" font-weight="bold" opacity="0.9">₹ 24,500.00</text>
  <text x="400" y="200" text-anchor="middle" fill="#666" font-family="monospace" font-size="10" opacity="0.6">━━━━━━━━━━━━━━━━━━━━</text>
  
  <!-- Keypad -->
  <rect x="310" y="245" width="35" height="25" rx="4" fill="#1a1a3e" stroke="#f7971e" stroke-width="1" opacity="0.5"/>
  <rect x="355" y="245" width="35" height="25" rx="4" fill="#1a1a3e" stroke="#f7971e" stroke-width="1" opacity="0.5"/>
  <rect x="400" y="245" width="35" height="25" rx="4" fill="#1a1a3e" stroke="#f7971e" stroke-width="1" opacity="0.5"/>
  <rect x="310" y="280" width="35" height="25" rx="4" fill="#1a1a3e" stroke="#f7971e" stroke-width="1" opacity="0.5"/>
  <rect x="355" y="280" width="35" height="25" rx="4" fill="#1a1a3e" stroke="#f7971e" stroke-width="1" opacity="0.5"/>
  <rect x="400" y="280" width="35" height="25" rx="4" fill="#1a1a3e" stroke="#f7971e" stroke-width="1" opacity="0.5"/>
  <rect x="310" y="315" width="35" height="25" rx="4" fill="#1a1a3e" stroke="#f7971e" stroke-width="1" opacity="0.5"/>
  <rect x="355" y="315" width="35" height="25" rx="4" fill="#1a1a3e" stroke="#f7971e" stroke-width="1" opacity="0.5"/>
  <rect x="400" y="315" width="35" height="25" rx="4" fill="#1a1a3e" stroke="#f7971e" stroke-width="1" opacity="0.5"/>
  <rect x="355" y="350" width="35" height="25" rx="4" fill="#1a1a3e" stroke="#ffd200" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Keypad numbers -->
  <text x="327" y="263" text-anchor="middle" fill="#ffd200" font-family="monospace" font-size="14" opacity="0.7">1</text>
  <text x="372" y="263" text-anchor="middle" fill="#ffd200" font-family="monospace" font-size="14" opacity="0.7">2</text>
  <text x="417" y="263" text-anchor="middle" fill="#ffd200" font-family="monospace" font-size="14" opacity="0.7">3</text>
  <text x="327" y="298" text-anchor="middle" fill="#ffd200" font-family="monospace" font-size="14" opacity="0.7">4</text>
  <text x="372" y="298" text-anchor="middle" fill="#ffd200" font-family="monospace" font-size="14" opacity="0.7">5</text>
  <text x="417" y="298" text-anchor="middle" fill="#ffd200" font-family="monospace" font-size="14" opacity="0.7">6</text>
  <text x="327" y="333" text-anchor="middle" fill="#ffd200" font-family="monospace" font-size="14" opacity="0.7">7</text>
  <text x="372" y="333" text-anchor="middle" fill="#ffd200" font-family="monospace" font-size="14" opacity="0.7">8</text>
