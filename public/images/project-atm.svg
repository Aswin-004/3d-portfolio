  <text x="372" y="368" text-anchor="middle" fill="#ffd200" font-family="monospace" font-size="14" opacity="0.8">0</text>
  
  <!-- Card slot -->
  <rect x="450" y="260" width="60" height="8" rx="4" fill="#f7971e" opacity="0.4"/>
  
  <!-- Side buttons -->
  <rect x="530" y="110" width="4" height="20" rx="2" fill="#ffd200" opacity="0.4"/>
  <rect x="530" y="145" width="4" height="20" rx="2" fill="#ffd200" opacity="0.4"/>
  <rect x="530" y="180" width="4" height="20" rx="2" fill="#ffd200" opacity="0.4"/>
  
  <!-- Text -->
  <text x="400" y="440" text-anchor="middle" fill="white" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="600" letter-spacing="1">ATM Simulator</text>
  <text x="400" y="470" text-anchor="middle" fill="#a0a0b0" font-family="system-ui, sans-serif" font-size="14" letter-spacing="2">JAVA  •  MYSQL  •  JDBC  •  MVC</text>
